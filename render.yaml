services:
    - type: web
      name: automations-dashboard
      runtime: node
      buildCommand: npm install && npm run build
      startCommand: npm start
      envVars:
          - key: NODE_ENV
            value: production
          - key: DATABASE_URL
            fromDatabase:
                name: automations-db
                property: connectionString

databases:
    - name: automations-db
      databaseName: automations_db
      user: automations_user
      region: oregon
